name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-22.04
    outputs:
      release-id: ${{ steps.create.outputs.id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create draft release with notes
        id: create
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Build release body from RELEASE_NOTES.md + download section
          NOTES=""
          if [ -f RELEASE_NOTES.md ]; then
            NOTES=$(cat RELEASE_NOTES.md)
          fi

          DOWNLOAD_SECTION=$(cat <<'EOF'

          ---

          ## Downloads

          | Platform | File |
          |----------|------|
          | **macOS (Apple Silicon)** | `.dmg` (aarch64) |
          | **macOS (Intel)** | `.dmg` (x86_64) |
          | **Windows** | `.msi` installer |
          | **Linux** | `.deb` package or `.AppImage` |

          **Requires:** [Claude Code](https://docs.anthropic.com/en/docs/claude-code) installed (`claude` CLI in PATH)
          EOF
          )

          BODY="${NOTES}${DOWNLOAD_SECTION}"

          gh release create "${{ github.ref_name }}" \
            --draft \
            --title "Glyphic ${{ github.ref_name }}" \
            --notes "$BODY"

          # Output the release ID so build jobs upload to this release
          RELEASE_ID=$(gh release view "${{ github.ref_name }}" --json databaseId -q .databaseId)
          echo "id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
          - platform: macos-13
            args: '--target x86_64-apple-darwin'
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''
          - platform: windows-latest
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tauriScript: 'bun run tauri'
          releaseId: ${{ needs.create-release.outputs.release-id }}
          args: ${{ matrix.args }}
          updaterJsonPreferNsis: true
