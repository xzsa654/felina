schema: spec-driven

context: |
  專案背景:
  Felina — Tauri v2 桌面 app,定位為多 agent skill 管理器。
  首要功能:
  - 管理 Anthropic / OpenAI / Google 等 agent 共用的 canonical skill 主檔,並同步(fan-out)到各 agent 的 skill 目錄
  - 多 agent token 統計圖表

  技術棧:
  - Shell: Tauri v2(桌面 app runtime)
  - Frontend: React 19 + TypeScript (strict) + Tailwind v4 + Zustand
  - Backend: Rust,frontend 透過 @tauri-apps/api 的 invoke 呼叫 Rust commands
  - UI 風格: Lucide icons + 手寫 Tailwind,無第三方元件庫
  - 靜態檢查: npm run check (tsc --noEmit) + cargo test --lib (Rust 單元測試)

  Feature 三層結構(新增 feature 必須三層都動):
  - src/lib/components/<feature>/         (前端頁面)
  - src/lib/tauri/commands.ts             (前端 invoke wrapper)
  - src-tauri/src/commands/<feature>.rs   (後端 + 在 lib.rs 註冊到 invoke_handler)

  Skill 儲存架構:
  - Canonical 主檔: ~/.felina/skills/<skill-name>/SKILL.md (Markdown + YAML frontmatter)
  - Sync metadata: ~/.felina/skills/<skill-name>/.felina-sync-meta.json (schema v2),
    記錄 targets list、per-target last_sync(pushed_hash / timestamp)、dirty flag
  - Target model: 每個 target 定義 agent(claude/codex/gemini)、scope(global/project)、
    project path(scope=project 時)、enabled/disabled、mode(tracked/detached/forked)
  - Fan-out: push 時 canonical 經 agent renderer 轉換後寫入 agent-native skill directory
    (如 .claude/skills/、.agents/skills/、.gemini/skills/),fan-out 使用 canonical directory
    name 作為 identity key,不使用 parsed frontmatter name
  - Import: 從 agent-native directory 掃描並匯入為 canonical skill

  i18n 架構:
  - 單一字典檔（src/lib/i18n/locales/en.ts 和 zh-TW.ts），不是每頁獨立 i18n 檔
  - 以 namespace 分頁：common.*、tokens.*、skills.*、projects.* 等
  - helper: t(locale, key, params?)，locale 來自 useLocaleStore Zustand store
  - TypeScript TranslationDict type 強制 en / zh-TW 結構對齊，缺 key 會 compile error
  - 不翻譯 user/system data（名稱、路徑、agent ID、時戳、後端錯誤）

  平台限制:
  - 考量到大多使用者環境是 Windows 11,symlink 預設不可用,跨平台同步採檔案複製
  - 沒有 CI 自動測試 UI,UI 變更需手動 npm run tauri dev 驗證
  - 桌面 app 同時 for Windows / macOS。嚴禁寫出「Windows 可、macOS 不可」的特化邏輯:
    路徑 identity 比對(專案路徑去重/比對)必須與後端 known_projects::normalize_path 一致 —
    反斜線→正斜線、去尾斜線,且僅在 Windows casefold(case-insensitive FS),
    macOS/Linux 保留原大小寫。前端一律走 src/lib/utils/path.ts 的 normalizeProjectPath,
    禁止對路徑無條件 .toLowerCase()。OS 專屬程式必須以 cfg(target_os=...) / 平台判定明確 guard。
locale: 繁體中文

rules:
  proposal:
    - Impact 章節的所有檔案路徑必須是 project root 相對路徑
    - 標明是否需要新增依賴(npm / Cargo)或檔案結構變動
    - 風險評估:標明破壞性變更、跨 change 依賴、backward compatibility 影響
  spec:
    - 使用英文撰寫,SHALL / MUST / SHOULD 規範語言
  design:
    - 做技術決策前,使用 /project-knowledge 查詢相關領域過去經驗
    - 列出可重用的現有元件(附檔案路徑),避免重複造輪
    - 說明對現有架構的影響(特別是 React 與 Rust 兩層的職責切分)
    - 必須有明確的 "In Scope" / "Out of Scope" 章節
    - design 主題用 **粗體** 而非 ### 標題(避免 spectra analyzer 解析錯誤)
    - 評估是否涉及安全敏感邏輯(讀寫使用者檔案系統、執行外部命令、處理外部輸入、
      agent 設定預設值),若是則在 design 中標記,tasks 產出時應包含 /spectra-audit 審查步驟
    - 評估是否新增第三方依賴(npm / Cargo crate),若是則記錄套件名稱、用途、
      授權類型,以及對 bundle size / 編譯時間的預估影響
  i18n:
    - 含 UI 文字新增/修改的 change,所有 user-facing text 必須使用 t(locale, key),
      不允許 hardcoded string literals
    - translation key 須同時加入 en.ts 和 zh-TW.ts,確保 TranslationDict type 對齊
    - 新 namespace 命名慣例:以頁面名稱為 namespace（如 skills.*、projects.*）,
      跨頁共用文字放 common.*
    - 不翻譯 user/system data（skill 名稱、檔案路徑、agent ID、時戳、後端錯誤訊息）
  tasks:
    - 第一個 task 為 baseline:跑 npm run check 記錄現有 TypeScript errors / warnings,
      驗證階段比較差異,明確區分本 change 新引入 vs pre-existing
    - 每個 task 必須有可驗證的完成條件(npm run check 通過 / 特定檔案不存在 /
      特定 UI 元素出現等)
    - 每個 task 定義一個 commit scope,實際 commit 時可依相關性合併
    - 單個 task 預估超過 1 小時要拆
    - 含 UI 變更(新增/修改頁面或元件)的 change,驗證階段須包含
      「npm run tauri dev 手動驗證」task,列出要驗證的具體行為
    - 涉及 Rust commands 新增/修改的 change,驗證階段須包含
      「cargo build 在 src-tauri/ 通過」task
